# Continuous Integration — Python API + React frontend
# (This is NOT config.yaml — GitHub Actions needs `on:`, `jobs:`, `steps:`.)

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # manual "Run workflow" in Actions tab

jobs:
  backend:
    name: Python — install & smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify syntax (compile)
        run: python -m compileall -q src

      - name: Smoke test — import Flask app
        run: python -c "from src.api import app; assert app.name"

  frontend:
    name: React — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        run: |
          npm ci
          npm run build

      - name: Check dist exists
        run: test -f dist/index.html
