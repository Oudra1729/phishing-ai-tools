# Configuration centralisée — Phishing Detection Pipeline
project:
  name: "AI-Powered Phishing Detection & Generation"
  random_seed: 42

paths:
  data_csv: "data/phishing.csv"
  outputs_dir: "outputs"
  models_dir: "outputs/models"
  metrics_dir: "outputs/metrics"
  plots_dir: "outputs/plots"

data:
  url_column: "url"
  label_column: "label"
  test_size: 0.2
  stratify: true

features:
  suspicious_keywords:
    - "login"
    - "verify"
    - "secure"
    - "account"
    - "update"
    - "confirm"
    - "banking"
    - "paypal"
    - "signin"
  tfidf:
    enabled: true
    analyzer: "char_wb"
    ngram_min: 3
    ngram_max: 5
    max_features: 2000

models:
  logistic_regression:
    max_iter: 2000
    class_weight: "balanced"
  random_forest:
    n_estimators: 150
    max_depth: 20
    n_jobs: 1
    class_weight: "balanced"
    random_state: 42
  gradient_boosting:
    n_estimators: 150
    max_depth: 5
    learning_rate: 0.1
    random_state: 42
  xgboost:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.9
    colsample_bytree: 0.9
    eval_metric: "logloss"
    random_state: 42

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

api:
  host: "127.0.0.1"
  port: 5000
  debug: false
